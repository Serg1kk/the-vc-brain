# vcbrain-web -- SSR container built from the web/ source (feature 12, design.md §5).
# Zero host ports -- Caddy reaches it by container name on localai_default.

name: vcbrain-web

services:
  web:
    build:
      context: ./web-src
      dockerfile: ../Dockerfile.web
      args:
        VITE_SUPABASE_REST_URL: ${VITE_SUPABASE_REST_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_N8N_BASE_URL: ${VITE_N8N_BASE_URL}
        VITE_DASHBOARD_USER: ${VITE_DASHBOARD_USER}
        VITE_DASHBOARD_PASSWORD: ${VITE_DASHBOARD_PASSWORD}
    container_name: vcbrain-web
    restart: unless-stopped
    networks:
      - localai_default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  localai_default:
    external: true
