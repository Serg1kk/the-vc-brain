dashboard.prodsignal.me {
    import service_tls
    # The web/ SPA's own "/" redirects to /apply (founder intake) -- that's
    # correct for submit.prodsignal.me but wrong here, so redirect only the
    # exact root path to the investor dashboard. Deep links (/app/feed, etc.)
    # still proxy straight through untouched.
    @root path /
    redir @root /app 302
    reverse_proxy vcbrain-web:3000
}
